# =============================================================================
#  航空驾驶舱模拟控制系统 — Default Configuration
# =============================================================================

[window]
# Screen resolution (used when fullscreen=0)
width  = 1920
height = 1080
# Fullscreen: 0 = windowed, 1 = fullscreen desktop (auto-matches native resolution)
fullscreen = 1
# Window title
title = Flight Cockpit Simulation System

[render]
# Target frames per second
target_fps = 60
# Font size for instrument labels (px)
font_size = 14
# Anti-aliasing: 0 = off, 1 = on
antialias = 1

[network]
# Data source: "xplane" = real X-Plane 11 UDP, "mock" = simulated flight data
data_source = xplane
# X-Plane 11 host IP address (only used when data_source = xplane)
xplane_host = 127.0.0.1
# Port X-Plane listens ON for commands (RPOS/DSEL subscription)
# Default in X-Plane: 49000 (Settings → Net Connections → UDP Ports → "Port we receive on")
xplane_cmd_port = 49000
# Port we listen ON for X-Plane DATA packets
# Set in X-Plane: Settings → Data Output → "UDP port" field
udp_recv_port = 49005
# Rate at which we request X-Plane to send data (Hz, 1-99)
data_rate = 20

[instruments]
# Enable/disable individual instruments
pfd_enabled   = 1
nd_enabled    = 1
eicas_enabled = 1
fmc_enabled   = 1

[map]
# 高德地图 API Web 服务 Key
amap_api_key = a4ef4592d0c5eab9be49a4cb32beeadd
# Map update interval (seconds)
map_update_interval = 5
# Map zoom level (3-17, higher = more zoomed in)
map_zoom = 6
# Tile fetch interval (ms)
map_update_ms = 5000

[audio]
# GPWS alert system: 1 = enabled, 0 = disabled
alerts_enabled = 1

[cabin]
# Cabin display HTTP server: 1 = enabled, 0 = disabled
enabled = 1
# HTTP server port
port = 8080
# Root directory for static web files (relative to executable or absolute)
www_root = resources/cabin
# 高德 JS API v2.0 Key (Web端 JS API). Apply at https://lbs.amap.com/
amap_js_key = a4ef4592d0c5eab9be49a4cb32beeadd

[ai]
# AI Co-pilot inference server (WebSocket via SSH tunnel)
enabled = 1
# SSH tunnel: localhost:58090 → workstation:8090
inference_host = 127.0.0.1
inference_port = 58090
# Minimum interval between state pushes (ms)
push_interval_ms = 200

[flywheel]
# AI Co-pilot Data Flywheel — automatic training data collection (Future Work)
# Master switch: 1 = enabled, 0 = disabled
enabled = 1
# Output directory for JSON sample files
output_dir = data/flywheel
# Ring buffer capacity in seconds (covers pre-trigger + post-trigger windows)
ring_buffer_seconds = 60
# Capture rate in Hz (should match X-Plane data_rate, typically 20)
capture_hz = 20
# L1 (alert-triggered): pre-trigger window (seconds)
l1_pre_sec = 30
# L1 (alert-triggered): post-trigger window (seconds)
l1_post_sec = 10
# L1 cooldown: same alert won't re-trigger within this (seconds)
l1_cooldown_sec = 5
# L2 (low-confidence): pre-trigger window (seconds)
l2_pre_sec = 15
# L2 (low-confidence): post-trigger window (seconds)
l2_post_sec = 5
# L3 (random sampling): interval between samples (seconds, 0 = disabled)
l3_interval_sec = 120
# L3 (random sampling): capture window per sample (seconds)
l3_window_sec = 10

[logging]
# Minimum log level: debug=0, info=1, warn=2, error=3
log_level = 1
# Optional log file path (leave empty for stdout only)
log_file =
