<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabin Moving Map</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden;
                 background: #e8ecf1; font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; }

    /* --- Top header bar --- */
    #header-bar {
        position: absolute; top: 0; left: 0; right: 0; height: 44px;
        background: linear-gradient(180deg, #1a3a5c 0%, #0d2840 100%);
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 24px; z-index: 110;
        border-bottom: 2px solid #2a6aac;
    }
    #header-left { display: flex; align-items: center; gap: 12px; }
    #header-icon {
        width: 28px; height: 28px;
        background: #fff; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 16px;
    }
    #header-route {
        color: #fff; font-size: 15px; font-weight: 600;
        letter-spacing: 1px;
    }
    #header-route .arrow { color: #5a9ad4; margin: 0 6px; }
    #header-right {
        display: flex; align-items: center; gap: 24px;
    }
    .header-info {
        text-align: right;
    }
    .header-info .label {
        font-size: 9px; color: #7a9ab4; text-transform: uppercase;
        letter-spacing: 1.5px;
    }
    .header-info .value {
        font-size: 15px; color: #fff; font-weight: bold;
        font-variant-numeric: tabular-nums;
    }

    /* --- Full-screen map container --- */
    #map {
        position: absolute; top: 44px; left: 0; right: 0;
        bottom: 80px;
    }

    /* Hide 高德 logo + copyright on cabin display (clean kiosk look) */
    .amap-logo, .amap-copyright { display: none !important; }

    /* --- Bottom data bar --- */
    #data-bar {
        position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
        background: linear-gradient(180deg, rgba(13,40,64,0.97) 0%, #0d2840 100%);
        border-top: 2px solid #2a6aac;
        display: flex; align-items: center; justify-content: space-around;
        padding: 0 20px; z-index: 100;
    }
    .data-item { text-align: center; }
    .data-label { font-size: 10px; color: #8ab4d8; text-transform: uppercase;
                  letter-spacing: 2px; margin-bottom: 2px; }
    .data-value { font-size: 22px; color: #ffffff; font-weight: bold;
                  font-variant-numeric: tabular-nums; }
    .data-unit  { font-size: 11px; color: #6a9cc4; margin-left: 3px; font-weight: normal; }

    /* --- Progress bar (above data bar) --- */
    #progress-wrap {
        position: absolute; bottom: 80px; left: 0; right: 0; height: 3px;
        background: rgba(255,255,255,0.08); z-index: 101;
    }
    #progress-fill {
        height: 100%; width: 0%;
        background: linear-gradient(90deg, #1a73e8, #4a9af5);
        transition: width 1s ease-out;
    }
</style>
</head>
<body>

<!-- Top header bar -->
<div id="header-bar">
    <div id="header-left">
        <div id="header-icon">✈</div>
        <div id="header-route">
            <span id="h-dep">----</span>
            <span class="arrow">→</span>
            <span id="h-arr">----</span>
        </div>
    </div>
    <div id="header-right">
        <div class="header-info">
            <div class="label">Altitude</div>
            <div class="value" id="h-alt">--- FT</div>
        </div>
        <div class="header-info">
            <div class="label">Ground Speed</div>
            <div class="value" id="h-gs">--- KTS</div>
        </div>
    </div>
</div>

<!-- Map -->
<div id="map"></div>

<!-- Progress bar -->
<div id="progress-wrap"><div id="progress-fill"></div></div>

<!-- Bottom data bar -->
<div id="data-bar">
    <div class="data-item">
        <div class="data-label">Ground Speed</div>
        <div class="data-value" id="v-gs">---<span class="data-unit">KTS</span></div>
    </div>
    <div class="data-item">
        <div class="data-label">Altitude</div>
        <div class="data-value" id="v-alt">---<span class="data-unit">FT</span></div>
    </div>
    <div class="data-item">
        <div class="data-label">Heading</div>
        <div class="data-value" id="v-hdg">---<span class="data-unit">°</span></div>
    </div>
    <div class="data-item">
        <div class="data-label">TAS</div>
        <div class="data-value" id="v-tas">---<span class="data-unit">KTS</span></div>
    </div>
    <div class="data-item">
        <div class="data-label">OAT</div>
        <div class="data-value" id="v-oat">---<span class="data-unit">°C</span></div>
    </div>
    <div class="data-item">
        <div class="data-label">Distance to Dest</div>
        <div class="data-value" id="v-dist">---<span class="data-unit">NM</span></div>
    </div>
    <div class="data-item">
        <div class="data-label">ETA</div>
        <div class="data-value" id="v-eta">--:--<span class="data-unit">UTC</span></div>
    </div>
</div>

<script>
/* ========================================================================
 *  Configuration — loaded from /api/config
 * ======================================================================== */
let AMAP_KEY = '';
const POLL_INTERVAL_MS = 1000;

/* ========================================================================
 *  State
 * ======================================================================== */
let map = null;
let aircraftMarker = null;       /* AMap.Marker */
let routeLine = null;            /* planned route polyline (solid blue) */
let flownLine = null;            /* flown path polyline (solid amber) */
let departureMarker = null;
let arrivalMarker = null;
let waypointMarkers = [];        /* array of {marker, label} */
let lastPosition = null;         /* {lat, lon} */
let initialCentered = false;     /* true after first map centering */
let lastRouteHash = '';          /* track route changes for setFitView */
let animFrameId = null;

/* Auto-zoom */
let baseZoom = 6;
let zoomStartTime = Date.now();
const ZOOM_CYCLE_S = 60;
const ZOOM_AMPLITUDE = 2.5;

/* ========================================================================
 *  Init — load config, then load 高德 JS API
 * ======================================================================== */
async function init() {
    try {
        const r = await fetch('/api/config');
        const cfg = await r.json();
        if (cfg.amap_js_key && cfg.amap_js_key !== 'YOUR_AMAP_KEY_HERE') {
            AMAP_KEY = cfg.amap_js_key;
        }
    } catch(e) { console.warn('Failed to load config, using default key', e); }

    if (!AMAP_KEY) {
        document.body.innerHTML = '<div style="color:#c0392b;text-align:center;'
            + 'padding:100px;font-size:18px;background:#f5f5f5;height:100%;">'
            + '<h2>高德地图 API Key 未配置</h2>'
            + '<p>请在 <code>config/default.cfg</code> 的 <code>[cabin]</code> 段设置 '
            + '<code>amap_js_key</code></p>'
            + '<p style="font-size:13px;color:#888;">Key 申请: https://lbs.amap.com/ → Web端(JS API)</p>'
            + '</div>';
        return;
    }

    /* Load 高德 JS API 2.0 dynamically */
    const script = document.createElement('script');
    script.src = `https://webapi.amap.com/maps?v=2.0&key=${AMAP_KEY}`;
    script.onload = onMapSDKReady;
    script.onerror = () => {
        document.body.innerHTML = '<div style="color:#c0392b;text-align:center;'
            + 'padding:100px;font-size:16px;background:#f5f5f5;height:100%;">'
            + '<h2>高德 JS API 加载失败</h2>'
            + '<p>请检查：</p>'
            + '<ul style="list-style:none;text-align:left;max-width:500px;margin:0 auto;">'
            + '<li>1. 网络连接是否正常</li>'
            + '<li>2. API Key 是否正确（Web端 JS API 类型）</li>'
            + '<li>3. Key 是否已添加 localhost:8080 到白名单</li>'
            + '</ul></div>';
    };
    document.head.appendChild(script);

    /* Fallback: if script doesn't load within 15s, show error */
    setTimeout(() => {
        if (typeof AMap === 'undefined') {
            document.body.innerHTML = '<div style="color:#e67e22;text-align:center;'
                + 'padding:100px;font-size:16px;background:#f5f5f5;height:100%;">'
                + '<h2>高德 JS API 加载超时</h2>'
                + '<p>地图服务无响应，请检查网络或 API Key 配置</p>'
                + '<p style="font-size:12px;color:#888;">Key 申请: https://lbs.amap.com/ → Web端(JS API)</p>'
                + '</div>';
        }
    }, 15000);
}

/* ========================================================================
 *  Map init (called when 高德 SDK loads)
 * ======================================================================== */
function onMapSDKReady() {
    map = new AMap.Map('map', {
        center: [104.0, 35.0],     /* [lng, lat] — central China default */
        zoom: baseZoom,
        mapStyle: 'amap://styles/normal',   /* bright standard map */
        zoomEnable: true,
        scrollWheel: false,
        doubleClickZoom: false,
        touchZoom: false,
        dragEnable: false,
        keyboardEnable: false,
        showBuildingBlock: false,
        viewMode: '2D',
    });

    /* Aircraft marker — blue triangle for visibility on light map */
    aircraftMarker = new AMap.Marker({
        position: [0, 0],
        content: '<div id="aircraft-icon" style="'
            + 'width:0;height:0;'
            + 'border-left:12px solid transparent;'
            + 'border-right:12px solid transparent;'
            + 'border-bottom:30px solid #1a73e8;'
            + 'filter:drop-shadow(0 2px 4px rgba(0,0,0,0.35));'
            + 'transform-origin:12px 20px;'
            + '"></div>',
        offset: new AMap.Pixel(-12, -20),
        zIndex: 999,
    });
    map.add(aircraftMarker);

    /* Start polling */
    fetchData();
    setInterval(fetchData, POLL_INTERVAL_MS);

    /* Start auto-zoom animation */
    requestAnimationFrame(autoZoom);
}

/* ========================================================================
 *  Data fetching
 * ======================================================================== */
async function fetchData() {
    try {
        const [posRes, routeRes] = await Promise.all([
            fetch('/api/position'),
            fetch('/api/route'),
        ]);
        const pos   = await posRes.json();
        const route = await routeRes.json();
        updateDisplay(pos, route);
    } catch(e) { console.error('Fetch error:', e); }
}

/* ========================================================================
 *  Display update
 * ======================================================================== */
function updateDisplay(pos, route) {
    /* --- Position interpolation (ease-out) --- */
    const targetLat = pos.lat, targetLon = pos.lon;
    if (lastPosition && targetLat !== 0) {
        const ease = 0.35;
        const newLat = lastPosition.lat + (targetLat - lastPosition.lat) * ease;
        const newLon = lastPosition.lon + (targetLon - lastPosition.lon) * ease;
        lastPosition = { lat: newLat, lon: newLon };
    } else if (targetLat !== 0) {
        lastPosition = { lat: targetLat, lon: targetLon };
    }

    /* --- Update aircraft marker --- */
    if (lastPosition) {
        const lnglat = new AMap.LngLat(lastPosition.lon, lastPosition.lat);
        aircraftMarker.setPosition(lnglat);
        /* Rotate icon */
        const icon = document.getElementById('aircraft-icon');
        if (icon) icon.style.transform = `rotate(${pos.hdg}deg)`;
    }

    /* --- Route lines --- */
    if (route.waypoints && route.waypoints.length > 0) {
        drawRoute(route.waypoints, route.active_idx, lastPosition);

        /* Recompute base zoom when route changes (or first load) */
        const routeHash = route.waypoints.map(w => w.ident).join('|');
        if (map && routeHash !== lastRouteHash) {
            lastRouteHash = routeHash;
            setTimeout(() => {
                const path = route.waypoints.map(w => [w.lon, w.lat]);
                if (path.length >= 2) {
                    map.setFitView(path, false, [60, 60, 80, 100]);
                    baseZoom = map.getZoom();
                    zoomStartTime = Date.now();
                }
                initialCentered = true;
            }, 800);
        }

        /* Progress */
        const total = route.total_distance_nm || 0;
        let flown = 0;
        
        let calcIdx = route.active_idx;
        if (calcIdx <= 0 && lastPosition && lastPosition.lat !== 0 && route.waypoints.length >= 2) {
            let minDist = Infinity;
            calcIdx = 1;
            for (let i = 0; i < route.waypoints.length - 1; i++) {
                const p1 = route.waypoints[i], p2 = route.waypoints[i+1];
                const l2 = (p1.lon - p2.lon)**2 + (p1.lat - p2.lat)**2;
                let dist = 0;
                if (l2 === 0) {
                    dist = (lastPosition.lon - p1.lon)**2 + (lastPosition.lat - p1.lat)**2;
                } else {
                    let t = ((lastPosition.lon - p1.lon) * (p2.lon - p1.lon) + (lastPosition.lat - p1.lat) * (p2.lat - p1.lat)) / l2;
                    t = Math.max(0, Math.min(1, t));
                    dist = (lastPosition.lon - (p1.lon + t * (p2.lon - p1.lon)))**2 + (lastPosition.lat - (p1.lat + t * (p2.lat - p1.lat)))**2;
                }
                if (dist < minDist) {
                    minDist = dist;
                    calcIdx = i + 1;
                }
            }
        }
        
        if (calcIdx >= 1 && route.waypoints.length > 1) {
            for (let i = 1; i <= calcIdx && i < route.waypoints.length; i++) {
                if (i === calcIdx && lastPosition && lastPosition.lat !== 0) {
                    const prev = route.waypoints[i-1];
                    flown += haversineNm(prev.lat, prev.lon, lastPosition.lat, lastPosition.lon);
                } else {
                    const a = route.waypoints[i-1], b = route.waypoints[i];
                    flown += haversineNm(a.lat, a.lon, b.lat, b.lon);
                }
            }
        }
        const pct = total > 0 ? Math.min(100, Math.round(flown / total * 100)) : 0;
        document.getElementById('progress-fill').style.width = pct + '%';

        /* Distance to destination */
        if (lastPosition && route.waypoints.length > 0) {
            const dest = route.waypoints[route.waypoints.length - 1];
            const distNm = haversineNm(lastPosition.lat, lastPosition.lon, dest.lat, dest.lon);
            document.getElementById('v-dist').innerHTML = Math.round(distNm) + '<span class="data-unit">NM</span>';
            /* ETA */
            if (pos.gs_kts > 30 && distNm > 1) {
                const hrs = distNm / pos.gs_kts;
                const now = new Date();
                const eta = new Date(now.getTime() + hrs * 3600000);
                document.getElementById('v-eta').innerHTML =
                    eta.toISOString().substr(11,5) + '<span class="data-unit">UTC</span>';
            } else {
                document.getElementById('v-eta').innerHTML = '--:--<span class="data-unit">UTC</span>';
            }
        }

        /* Header bar — route labels */
        document.getElementById('h-dep').textContent = route.dep_icao || '----';
        document.getElementById('h-arr').textContent = route.arr_icao || '----';
    } else {
        document.getElementById('v-dist').innerHTML = '---<span class="data-unit">NM</span>';
        document.getElementById('v-eta').innerHTML = '--:--<span class="data-unit">UTC</span>';
        document.getElementById('h-dep').textContent = '----';
        document.getElementById('h-arr').textContent = '----';
    }

    /* --- Initial centering on aircraft when no route yet --- */
    if (!initialCentered && lastPosition && map) {
        map.setZoomAndCenter(10, [lastPosition.lon, lastPosition.lat]);
        baseZoom = map.getZoom();
        zoomStartTime = Date.now();
        initialCentered = true;
    }

    /* --- Header bar values --- */
    document.getElementById('h-alt').textContent = Math.round(pos.alt_ft || 0).toLocaleString() + ' FT';
    document.getElementById('h-gs').textContent  = Math.round(pos.gs_kts || 0) + ' KTS';

    /* --- Data bar values --- */
    document.getElementById('v-gs').innerHTML  = Math.round(pos.gs_kts || 0) + '<span class="data-unit">KTS</span>';
    document.getElementById('v-alt').innerHTML = Math.round(pos.alt_ft || 0).toLocaleString() + '<span class="data-unit">FT</span>';
    document.getElementById('v-hdg').innerHTML = Math.round(pos.hdg || 0) + '<span class="data-unit">°</span>';
    document.getElementById('v-tas').innerHTML = Math.round(pos.tas_kts || 0) + '<span class="data-unit">KTS</span>';
    document.getElementById('v-oat').innerHTML = (pos.oat_c != null ? pos.oat_c.toFixed(1) : '--') + '<span class="data-unit">°C</span>';
}

/* ========================================================================
 *  Route drawing — solid lines on light map
 * ======================================================================== */
function drawRoute(waypoints, activeIdx, currentPos) {
    if (!map) return;

    /* Clear previous */
    if (routeLine) { map.remove(routeLine); routeLine = null; }
    if (flownLine) { map.remove(flownLine); flownLine = null; }
    if (departureMarker) { map.remove(departureMarker); departureMarker = null; }
    if (arrivalMarker)  { map.remove(arrivalMarker);  arrivalMarker  = null; }
    waypointMarkers.forEach(w => { map.remove(w.marker); map.remove(w.label); });
    waypointMarkers = [];

    if (waypoints.length < 2) return;

    const path = waypoints.map(w => [w.lon, w.lat]);

    /* Full planned route — yellow dashed line (drawn first, underneath) */
    routeLine = new AMap.Polyline({
        path: path,
        strokeColor: '#FFCC00',
        strokeWeight: 4,
        strokeOpacity: 0.85,
        strokeStyle: 'dashed',
        strokeDasharray: [10, 10],
        lineJoin: 'round',
        lineCap: 'round',
        zIndex: 40,
    });
    map.add(routeLine);

    /* Flown segment — solid blue line (drawn on top, dynamically follows plane) */
    let flownPath = [];
    let calcActiveIdx = activeIdx;
    
    // Fallback: If activeIdx is 0 (FMC hasn't sequenced), find closest segment
    if (calcActiveIdx <= 0 && currentPos && currentPos.lat !== 0 && path.length >= 2) {
        let minDist = Infinity;
        calcActiveIdx = 1;
        for (let i = 0; i < path.length - 1; i++) {
            const p1 = path[i], p2 = path[i+1];
            const l2 = (p1[0] - p2[0])**2 + (p1[1] - p2[1])**2;
            let dist = 0;
            if (l2 === 0) {
                dist = (currentPos.lon - p1[0])**2 + (currentPos.lat - p1[1])**2;
            } else {
                let t = ((currentPos.lon - p1[0]) * (p2[0] - p1[0]) + (currentPos.lat - p1[1]) * (p2[1] - p1[1])) / l2;
                t = Math.max(0, Math.min(1, t));
                dist = (currentPos.lon - (p1[0] + t * (p2[0] - p1[0])))**2 + (currentPos.lat - (p1[1] + t * (p2[1] - p1[1])))**2;
            }
            if (dist < minDist) {
                minDist = dist;
                calcActiveIdx = i + 1;
            }
        }
    }

    if (calcActiveIdx > 0 && calcActiveIdx < waypoints.length) {
        flownPath = path.slice(0, calcActiveIdx);
        if (currentPos && currentPos.lat !== 0) {
            flownPath.push([currentPos.lon, currentPos.lat]);
        }
    } else if (calcActiveIdx >= waypoints.length) {
        flownPath = path.slice();
    }

    if (flownPath.length >= 2) {
        flownLine = new AMap.Polyline({
            path: flownPath,
            strokeColor: '#1a73e8',
            strokeWeight: 5,
            strokeOpacity: 0.9,
            strokeStyle: 'solid',
            lineJoin: 'round',
            lineCap: 'round',
            zIndex: 50,
        });
        map.add(flownLine);
    }

    /* Departure marker (first WP — green) */
    const dep = waypoints[0];
    departureMarker = new AMap.Marker({
        position: [dep.lon, dep.lat],
        content: '<div style="width:16px;height:16px;border-radius:50%;'
            + 'background:#27ae60;border:2.5px solid #fff;'
            + 'box-shadow:0 0 10px rgba(39,174,96,0.5), 0 1px 3px rgba(0,0,0,0.3);"></div>',
        offset: new AMap.Pixel(-8, -8),
        zIndex: 110,
    });
    map.add(departureMarker);
    addTextLabel(dep, waypoints[0].ident, '#1a6e3a');

    /* Arrival marker (last WP — red) */
    const arr = waypoints[waypoints.length - 1];
    arrivalMarker = new AMap.Marker({
        position: [arr.lon, arr.lat],
        content: '<div style="width:16px;height:16px;border-radius:50%;'
            + 'background:#e74c3c;border:2.5px solid #fff;'
            + 'box-shadow:0 0 10px rgba(231,76,60,0.5), 0 1px 3px rgba(0,0,0,0.3);"></div>',
        offset: new AMap.Pixel(-8, -8),
        zIndex: 110,
    });
    map.add(arrivalMarker);
    addTextLabel(arr, waypoints[waypoints.length - 1].ident, '#a82020');

    /* Intermediate waypoint labels */
    for (let i = 1; i < waypoints.length - 1; i++) {
        addTextLabel(waypoints[i], waypoints[i].ident, '#335577');
    }
}

function addTextLabel(wp, text, color) {
    if (!map || !text) return;
    const lbl = new AMap.Text({
        text: text,
        position: [wp.lon, wp.lat],
        offset: new AMap.Pixel(0, -22),
        style: {
            'color': color,
            'font-size': '10px',
            'font-weight': 'bold',
            'text-shadow': '0 0 2px rgba(255,255,255,0.8)',
            'background': 'transparent',
            'border': 'none',
            'pointer-events': 'none',
        },
        zIndex: 105,
    });
    map.add(lbl);
    /* Also add a tiny dot */
    const dot = new AMap.Marker({
        position: [wp.lon, wp.lat],
        content: '<div style="width:5px;height:5px;border-radius:50%;'
            + 'background:' + color + ';opacity:0.8;'
            + 'box-shadow:0 0 2px rgba(255,255,255,0.5);"></div>',
        offset: new AMap.Pixel(-2, -2),
        zIndex: 100,
    });
    map.add(dot);
    waypointMarkers.push({ marker: dot, label: lbl });
}

/* ========================================================================
 *  Auto-zoom (sine-wave cycle, 60 s period)
 * ======================================================================== */
function autoZoom() {
    if (!map || baseZoom <= 0) { requestAnimationFrame(autoZoom); return; }

    const elapsed = (Date.now() - zoomStartTime) / 1000;
    const phase = (elapsed % ZOOM_CYCLE_S) / ZOOM_CYCLE_S; /* 0..1 */
    /* sin: 0→+amp→0→-amp→0 over one cycle */
    const offset = Math.sin(phase * Math.PI * 2) * ZOOM_AMPLITUDE;
    const targetZoom = baseZoom + offset;

    const currentZoom = map.getZoom();
    const newZoom = currentZoom + (targetZoom - currentZoom) * 0.05;
    map.setZoom(newZoom);

    requestAnimationFrame(autoZoom);
}

/* ========================================================================
 *  Haversine distance (NM)
 * ======================================================================== */
function haversineNm(lat1, lon1, lat2, lon2) {
    const R = 3440.065; /* Earth radius in nautical miles */
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2
            + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180)
            * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

/* ========================================================================
 *  Boot
 * ======================================================================== */
window.onload = init;
</script>
</body>
</html>
